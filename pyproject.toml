[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "venv", "data", "frontend"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (ruff format handles this)
    "B008",  # do not perform function calls in default arguments (FastAPI pattern)
    "SIM108", # ternary operator (sometimes less readable)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
# load_dotenv() must run before app imports so env vars are available at import time
"app/main.py" = ["E402"]
"app/crawler/run.py" = ["E402"]
