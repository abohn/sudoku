repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/
      - id: end-of-file-fixer
        exclude: ^frontend/
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  # Python: ruff (format + lint)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # JS/TS: prettier (format)
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: prettier
        args: [--write, --ignore-unknown]
        files: ^frontend/src/.*\.(ts|tsx|css|json)$
        additional_dependencies:
          - prettier@^3

  # JS/TS: ESLint (lint)
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && npx eslint --fix src/'
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # TypeScript: type-check
  - repo: local
    hooks:
      - id: tsc
        name: tsc
        language: system
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
