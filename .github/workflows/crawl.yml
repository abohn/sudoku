name: Crawl & Export

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      months:
        description: "How many months of history to fetch (leave blank for 1)"
        required: false
        default: "1"

permissions:
  contents: write
  issues: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # The DB is gitignored; restore it from cache so incremental crawls work.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/sudoku.db
          key: sudoku-db-${{ runner.os }}
          restore-keys: sudoku-db-

      - name: Run crawler
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CTC_CHANNEL_ID: "@crackingthecryptic"
        run: |
          mkdir -p data
          python -m app.crawler.run --months ${{ inputs.months || 1 }}

      - name: Export static data
        run: python scripts/export_static.py

      # Cache is saved automatically after the job (even on failure) by actions/cache.

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: update puzzle data $(date -u +%Y-%m-%d)"
          git push

      - name: Open issue on failure
        if: failure()
        run: |
          EXISTING=$(gh issue list --label "crawl-failure" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open, skipping."
          else
            BODY=$(printf "Crawl failed — data.json was not updated.\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nClose this issue once the crawl is healthy again.")
            gh issue create \
              --title "Crawl failed: $(date -u +%Y-%m-%d)" \
              --body "$BODY" \
              --label "crawl-failure"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
